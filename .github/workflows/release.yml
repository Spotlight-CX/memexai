name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  bump-and-tag:
    name: Bump version and tag
    if: |
      github.event.pull_request.merged == true && (
        contains(github.event.pull_request.labels.*.name, 'release:patch') ||
        contains(github.event.pull_request.labels.*.name, 'release:minor') ||
        contains(github.event.pull_request.labels.*.name, 'release:major')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type
        id: bump
        run: |
          LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          if echo "$LABELS" | grep -q '"release:major"'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q '"release:minor"'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute new version
        id: version
        run: |
          CURRENT=$(node -p "require('./packages/core/package.json').version")
          NEW=$(npx --yes semver -i ${{ steps.bump.outputs.type }} "$CURRENT")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"
          echo "Bumping $CURRENT → $NEW (${{ steps.bump.outputs.type }})"

      - name: Update package.json versions
        run: |
          NEW="${{ steps.version.outputs.new }}"
          for PKG in packages/core packages/sdk packages/admin-cli; do
            node -e "
              const fs = require('fs');
              const p = './$PKG/package.json';
              const j = JSON.parse(fs.readFileSync(p, 'utf8'));
              j.version = '$NEW';
              fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
            "
            echo "Updated $PKG to $NEW"
          done

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/core/package.json packages/sdk/package.json packages/admin-cli/package.json
          git commit -m "chore: release v${{ steps.version.outputs.new }}"
          git tag "v${{ steps.version.outputs.new }}"
          git push origin HEAD:main --tags

  publish:
    name: Publish
    needs: bump-and-tag
    uses: ./.github/workflows/publish.yml
    permissions:
      contents: write
      id-token: write
